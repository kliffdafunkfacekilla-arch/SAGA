<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGA - DM Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #0f0; font-family: monospace; }
        .card { background-color: #111; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .card-header { background-color: #222; border-bottom: 1px solid #444; font-weight: bold; color: #fff; text-transform: uppercase; }
        .metric-box { border: 1px solid #0f0; padding: 10px; text-align: center; margin-bottom: 10px; }
        .metric-val { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1 class="text-center mb-4">God-View: SAGA Maintenance Dashboard</h1>
    
    <div class="row">
        <!-- Engine Controls -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header text-warning">ENGINE CONTROLS</div>
                <div class="card-body text-center">
                    <p class="text-light">Current Tick: <span id="currentTick" class="fs-4 text-warning">0</span></p>
                    <button class="btn btn-warning w-100" onclick="triggerTick()">TRIGGER WORLD TICK</button>
                    <hr class="border-secondary">
                    <a href="/play" class="btn btn-outline-info w-100" target="_blank">Open Player View (/play)</a>
                </div>
            </div>
        </div>
        
        <!-- Global Metrics -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header text-info">GLOBAL METRICS</div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-sm-4">
                            <div class="metric-box">
                                <div>Total Burgs</div>
                                <div id="totalBurgs" class="metric-val text-info">0</div>
                            </div>
                        </div>
                        <div class="col-sm-4">
                            <div class="metric-box border-danger">
                                <div class="text-danger">Avg Chaos</div>
                                <div id="avgChaos" class="metric-val text-danger">0.0</div>
                            </div>
                        </div>
                        <div class="col-sm-4">
                            <div class="metric-box border-warning">
                                <div class="text-warning">Prison Integrity</div>
                                <div id="prisonIntegrity" class="metric-val text-warning">10000</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header text-danger">FACTION & ECOLOGY SUMMARY</div>
                <div class="card-body">
                    <pre id="adminLog" style="color: #ccc; max-height: 300px; overflow-y: auto;">Awaiting data...</pre>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadStats() {
        try {
            const res = await fetch('/api/admin/stats');
            const data = await res.json();
            
            document.getElementById('currentTick').innerText = data.tick;
            document.getElementById('totalBurgs').innerText = data.total_burgs;
            document.getElementById('avgChaos').innerText = data.avg_chaos.toFixed(1);
            document.getElementById('prisonIntegrity').innerText = data.avg_prison_integrity.toFixed(0);
            
            let logHtml = `ACTIVE STORY HOOKS:\n`;
            data.hooks.forEach(h => logHtml += `- [${h.status}] ${h.hook_category}: ${h.description}\n`);
            
            logHtml += `\nFACTIONS:\n`;
            data.cults.forEach(c => logHtml += `- Cults in Burg ${c.location_id}: ${c.new_members.toFixed(1)} members, ${c.priests.toFixed(1)} priests\n`);
            
            document.getElementById('adminLog').innerText = logHtml;
        } catch(e) {
            console.error(e);
            document.getElementById('adminLog').innerText = "Error loading stats: " + e;
        }
    }
    
    async function triggerTick() {
        try {
            const res = await fetch('/api/ttrpg/tick', {method: 'POST'});
            const data = await res.json();
            if(data.status === 'success') {
                loadStats();
            }
        } catch(e) {
            console.error(e);
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        loadStats();
        setInterval(loadStats, 10000); // Poll every 10s
    });
</script>
</body>
</html>
